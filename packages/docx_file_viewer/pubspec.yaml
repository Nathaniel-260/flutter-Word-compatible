name: docx_file_viewer
description: A Flutter package for rendering DOCX files with native widgets. View, zoom, search, and interact with Word documents.
version: 1.0.2
repository: https://github.com/alihassan143/htmltopdfwidgets
homepage: https://github.com/alihassan143/htmltopdfwidgets/tree/main/packages/docx_file_viewer
topics:
  - docx
  - word
  - viewer
  - document
  - office
screenshots:
  - description: "Example of view"
    path: example.gif
environment:
  sdk: ^3.6.0
  # Floor reflects the newest framework APIs actually used: Color.withValues and
  # MediaQuery.maybeDevicePixelRatioOf (both Flutter 3.27 / Dart 3.6). The old
  # ">=3.0.0" was stale — pub-get would have succeeded on SDKs that cannot compile.
  flutter: ">=3.27.0"
  

dependencies:
  flutter:
    sdk: flutter
  docx_creator: 1.2.7
  url_launcher: ^6.3.2
  xml: ^6.6.1
dependency_overrides:
  meta: 1.18.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  archive: ^4.0.9
